spring:
  application:
    name: neon-aim-backend
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  cache:
    type: simple

server:
  port: ${SERVER_PORT:3100}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui

app:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://127.0.0.1:5173}
      - ${FRONTEND_LOCALHOST_ORIGIN:http://localhost:5173}
  auth:
    issuer: neon-aim
    jwt-secret: ${AUTH_JWT_SECRET:local-neon-aim-development-secret-change-before-production}
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
    refresh-cookie-name: neon_refresh
    refresh-cookie-secure: ${AUTH_COOKIE_SECURE:false}
