spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis

app:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN}
  auth:
    jwt-secret: ${AUTH_JWT_SECRET}
    refresh-cookie-secure: true
